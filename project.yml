name: GuardianRoad
options:
  bundleIdPrefix: com.guardianroad
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""

targets:
  GuardianRoad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GuardianRoad
    info:
      path: GuardianRoad/Info.plist
      properties:
        CFBundleDisplayName: "Guardian Road"
        NSCameraUsageDescription: "Guardian Road needs your camera for dashcam recording."
        NSMicrophoneUsageDescription: "Guardian Road records audio with your clips and listens for voice commands."
        NSSpeechRecognitionUsageDescription: "Guardian Road listens for the 'save clip' voice command to trigger hazard saves."
        NSPhotoLibraryAddUsageDescription: "Guardian Road saves hazard clips to your photo library."
        NSLocationWhenInUseUsageDescription: "Guardian Road tags saved clips with GPS location for the hazard map."
        UIBackgroundModes:
          - audio
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.guardianroad.app
        INFOPLIST_FILE: GuardianRoad/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
